<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sk8board — telemetry example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #b8fc39;
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
      text-shadow: 0 0 8px #b8fc39;
    }

    #hud span { color: #fff; }
  </style>
</head>
<body>
  <div id="hud">
    roll:    <span id="v-roll">0.000</span> rad<br>
    pitch:   <span id="v-pitch">0.000</span> rad<br>
    yaw:     <span id="v-yaw">0.000</span> rad<br>
    speed:   <span id="v-speed">0.000</span> m/s<br>
    airborne:<span id="v-air">false</span>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
